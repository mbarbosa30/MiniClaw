kind = "web"
previewPath = "/selfclaw-landing/"
title = "MiniClaw Landing Page"
version = "1.0.0"
id = "artifacts/selfclaw-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/selfclaw-landing/" ]
localPort = 20477

[services.development]
run = "pnpm --filter @workspace/selfclaw-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/selfclaw-landing", "run", "build" ]
publicDir = "artifacts/selfclaw-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20477"
BASE_PATH = "/selfclaw-landing/"
