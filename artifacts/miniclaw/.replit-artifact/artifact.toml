kind = "web"
previewPath = "/"
title = "MiniClaw for MiniPay"
version = "1.0.0"
id = "artifacts/miniclaw"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20240
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/miniclaw run dev"

[services.env]
PORT = "20240"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/miniclaw", "run", "build"]
publicDir = "artifacts/miniclaw/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
